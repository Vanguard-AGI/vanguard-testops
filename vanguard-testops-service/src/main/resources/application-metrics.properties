# ==========================================
# 用例效能指标定时任务配置
# ==========================================
# 说明：使用标准的 Cron 表达式格式：秒 分 时 日 月 周
# ==========================================

# CS值计算定时任务
# 默认：每天凌晨2点执行（建议在测试计划指标之前）
metrics.schedule.case-cs=0 0 2 * * ?

# 每日效能指标计算
# 默认：每天凌晨4点执行
metrics.schedule.case-metrics-daily=0 0 4 * * ?

# 每周效能指标计算
# 默认：每周一凌晨4点执行
metrics.schedule.case-metrics-weekly=0 0 4 ? * MON

# 每月效能指标计算
# 默认：每月1号凌晨4点执行
metrics.schedule.case-metrics-monthly=0 0 4 1 * ?

# 飞书需求同步
# 默认：每天凌晨1点执行，避免白天CPU峰值影响业务
# 注意：需要配置 feishu.meego.default-user-email 才会执行
metrics.schedule.feishu-sync=0 0 1 * * ?

