logging.file.path=${user.home}/.metersphere/logs

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3307/metersphere?useUnicode=true&characterEncoding=utf8&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Kafka 配置
kafka.bootstrap-servers=localhost:9092

# Redis 配置 (Redisson)
spring.redis.redisson.file=file:./opt/metersphere/conf/redisson.yml

# 本地 MinIO 配置 (替代阿里云避免冲突)
oss.endpoint=http://localhost:9000
oss.access-key=minioadmin
oss.secret-key=minioadmin
oss.bucket-name=metersphere
oss.provider=minio
