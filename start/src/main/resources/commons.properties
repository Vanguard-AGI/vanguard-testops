spring.application.name=vanguard-testops
management.server.port=7071
server.port=8081
# gzip
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css,text/javascript,image/jpeg
server.compression.min-response-size=2048
#
quartz.enabled=true
quartz.scheduler-name=msScheduler
quartz.thread-count=10
quartz.properties.org.quartz.jobStore.acquireTriggersWithinLock=true
#
logging.file.path=${logging.file.path:/opt/metersphere/logs/metersphere}
# Hikari
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.pool-name=DatebookHikariCP
# max-lifetime 应该比 MySQL wait_timeout 少 30 秒左右，避免连接被数据库关闭
# 如果 MySQL wait_timeout=600 (10分钟)，则设置为 570000 (9.5分钟)
# 如果 MySQL wait_timeout=28800 (8小时)，则设置为 28770000 (约8小时-30秒)
spring.datasource.hikari.max-lifetime=570000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1
#
spring.datasource.quartz.url=${spring.datasource.url}
spring.datasource.quartz.username=${spring.datasource.username}
spring.datasource.quartz.password=${spring.datasource.password}
spring.datasource.quartz.hikari.maximum-pool-size=50
spring.datasource.quartz.hikari.minimum-idle=10
spring.datasource.quartz.hikari.idle-timeout=300000
spring.datasource.quartz.hikari.auto-commit=true
spring.datasource.quartz.hikari.pool-name=DatebookHikariCP
# max-lifetime 应该比 MySQL wait_timeout 少 30 秒左右
spring.datasource.quartz.hikari.max-lifetime=570000
spring.datasource.quartz.hikari.connection-timeout=30000
spring.datasource.quartz.hikari.connection-test-query=SELECT 1
#
# spring.kafka
spring.kafka.bootstrap-servers=${kafka.bootstrap-servers}
spring.kafka.consumer.group-id=metersphere_group_id
spring.kafka.listener.missing-topics-fatal=false
# default size 1G
spring.kafka.producer.properties.max.request.size=1073741824
spring.kafka.producer.properties.buffer.memory=1073741824
spring.kafka.consumer.properties.max.partition.fetch.bytes=1073741824
spring.kafka.producer.batch-size=16384
spring.kafka.producer.acks=1
# workflow executor
# 执行机地址配置（支持线上线下环境）
# 线上环境: http://executor.prod.example.com:8100
# 线下环境: http://192.168.29.107:8100
workflow.executor.base-url=http://snaptest.tst.spotter.ink
# workflow.executor.base-url=http://192.168.29.96:8100
# mybatis
mybatis.configuration.cache-enabled=true
mybatis.configuration.lazy-loading-enabled=false
mybatis.configuration.aggressive-lazy-loading=true
mybatis.configuration.multiple-result-sets-enabled=true
mybatis.configuration.use-column-label=true
mybatis.configuration.auto-mapping-behavior=full
mybatis.configuration.default-statement-timeout=25000
mybatis.configuration.map-underscore-to-camel-case=true
# virtual thread
spring.threads.virtual.enabled=true
# flyway enable
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:migration
spring.flyway.table=metersphere_version
spring.flyway.baseline-version=0
spring.flyway.encoding=UTF-8
spring.flyway.validate-on-migrate=false

# jmeter
jmeter.home=/opt/jmeter
# file upload
spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB
# i18n
spring.messages.basename=i18n/commons,i18n/api,i18n/bug,i18n/case,i18n/plan,i18n/project,i18n/system,i18n/dashboard
# actuator
management.endpoints.web.exposure.include=*
management.endpoints.enabled-by-default=false
# redisson
spring.session.timeout=604800s
spring.redis.redisson.file=file:/opt/metersphere/conf/redisson.yml
spring.session.redis.repository-type=indexed
#
spring.freemarker.check-template-location=false
spring.groovy.template.check-template-location=false

# swagger docs config
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.api-docs.groups.enabled=true
# OSS 配置
oss.endpoint=https://oss-cn-hangzhou.aliyuncs.com
oss.access-key=${MS_OSS_ACCESS_KEY:REPLACE_ME}
oss.secret-key=${MS_OSS_SECRET_KEY:REPLACE_ME}
oss.bucket-name=spotter-aegis-test
oss.region=cn-hangzhou
oss.provider=aliyun
# 禁用 MinIO
minio.enabled=false
minio.endpoint=
minio.access-key=
minio.secret-key=
# batch download max size
metersphere.file.batch-download-max=600MB
spring.messages.default-locale=zh_CN
# spring mvc
#spring.mvc.async.request-timeout=3600000
#server.jetty.threads.idle-timeout=3600000

# 飞书Meego项目管理配置（缺陷双向同步需配置 project-key）
feishu.meego.base-url=https://project.feishu.cn
feishu.meego.plugin-id=${MS_MEEGO_PLUGIN_ID:REPLACE_ME}
feishu.meego.plugin-secret=${MS_MEEGO_PLUGIN_SECRET:REPLACE_ME}
feishu.meego.default-user-email=jan.zhang@spotterio.com
# 飞书项目 key（在飞书项目设置/URL 中查看），未配置时我们→飞书同步会跳过
feishu.meego.project-key=663b578cd2cdc7195b51c4c5
# 飞书缺陷优先级字段 ID（工作项配置里显示为 字段ID: severity）
feishu.meego.priority-field-id=severity
