# Basic JMeter Properties for MeterSphere
# Created for Windows development environment

# JMeter Version
jmeter.version=5.6.3

# Proxy settings
proxy.host=
proxy.port=
proxy.username=
proxy.password=

# Look and feel
jmeter.laf=javax.swing.plaf.metal.MetalLookAndFeel

# Logging
log_level.org.apache.jmeter=INFO

# Default encoding
sampleresult.default.encoding=UTF-8

# Maximum result to hold in memory
view.results.tree.max_results=500

# Timer
timer.factor=1.0

# HTTP settings
httpclient4.retrycount=3
httpclient4.request.timeout=0
httpclient4.sotimeout=0
httpclient4.connection.timeout=0

# SSL settings
https.default.protocol=TLS
https.socket.protocols=TLSv1.2,TLSv1.3

# JMeter Properties
jmeter.save.saveservice.output_format=xml
jmeter.save.saveservice.response_data=false
jmeter.save.saveservice.samplerData=false
jmeter.save.saveservice.requestHeaders=false
jmeter.save.saveservice.responseHeaders=false
jmeter.save.saveservice.encoding=false
jmeter.save.saveservice.label=true
jmeter.save.saveservice.latency=true
jmeter.save.saveservice.response_code=true
jmeter.save.saveservice.response_message=true
jmeter.save.saveservice.successful=true
jmeter.save.saveservice.thread_name=true
jmeter.save.saveservice.time=true
jmeter.save.saveservice.subresults=true
jmeter.save.saveservice.assertions=true
jmeter.save.saveservice.bytes=true
