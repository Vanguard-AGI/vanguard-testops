# MeterSphere 配置文件
# 数据库配置
spring.datasource.url=${MS_MYSQL_DB_HOST_PORT:jdbc:mysql://mysql.tst.spotter.ink:31070/spotter_aegis}?autoReconnect=false&useUnicode=true&characterEncoding=UTF-8&characterSetResults=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=${MS_MYSQL_DB_USER:root}
spring.datasource.password=${MS_MYSQL_DB_PASSWORD:root}

# Redis 配置
spring.redis.host=${MS_REDIS_HOST:127.0.0.1}
spring.redis.port=${MS_REDIS_PORT:6379}
spring.redis.password=${MS_REDIS_PASSWORD:}
spring.redis.database=${MS_REDIS_DB:1}
# Redisson 配置文件路径（指向项目根目录）
spring.redis.redisson.file=file:${user.dir}/opt/metersphere/conf/redisson.yml

# Kafka 配置（本地开发环境）
kafka.bootstrap-servers=${MS_KAFKA_HOST:127.0.0.1}:${MS_KAFKA_PORT:9092}

# 对象存储配置（阿里云 OSS）
oss.endpoint=${MS_OSS_ENDPOINT:https://oss-cn-hangzhou.aliyuncs.com}
oss.access-key=${MS_OSS_ACCESS_KEY:REPLACE_ME}
oss.secret-key=${MS_OSS_SECRET_KEY:REPLACE_ME}
oss.bucket-name=${MS_OSS_BUCKET:spotter-aegis-test}
oss.region=${MS_OSS_REGION:cn-hangzhou}

# Swagger/OpenAPI 配置（启用 Swagger UI）
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.api-docs.groups.enabled=true
